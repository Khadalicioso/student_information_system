<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Edit</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <div class="admin-right-section">
      <ul>
        <li><a href="/admin_homepage.html" class="admin-item">Admin</a></li>
        <li><a href="/admin_faculty.html" class="admin-item">Faculty</a></li>
        <li><a href="#" class="admin-item">Strand</a></li>
        <li><a href="#" class="admin-item">Grading</a></li>
        <li><a href="#" class="admin-item">Settings</a></li>
      </ul>
      <a href="/login_as.html" class="admin-sign-out" id="admin-sign-out"
        >Sign Out</a
      >
    </div>

    <div class="admin-left-section">
      <div class="admin-arrow">
        <ul>
          <li>
            <a href="/admin_member.html"
              ><span class="material-symbols-outlined">
                arrow_back_ios
              </span></a
            >
          </li>
        </ul>
      </div>
      <div class="admin-box-btn">
        <button class="admin-save-btn">Save</button>
        <button class="admin-edit-btn">Edit</button>
        <button class="admin-delete-btn">Delete</button>
      </div>
      <div class="admin-edit-container">
        <div class="admin-edit-content">
          <div class="admin-edit-profile">
            <img
              src="/assets/images/user.png"
              alt="Profile Picture"
              class="admin-edit-img"
            />
          </div>
        </div>
        <div class="admin-edit-info">
          <div class="admin-edit">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="admin-edit">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" readonly />
          </div>
          <div class="admin-edit">
            <label for="birthdate">Birthdate:</label>
            <input
              type="date"
              id="birthdate"
              name="birthdate"
              onchange="calculateAge()"
              required
            />
          </div>
          <div class="admin-edit">
            <label for="sex">Sex:</label>
            <select id="sex" name="sex" required>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
        </div>
      </div>
      <div class="admin-edit-strands">
        <button class="edit-strand-btn">STEM</button>
        <button class="edit-strand-btn">ABM</button>
        <button class="edit-strand-btn">GAS</button>
        <button class="edit-strand-btn">HUMSS</button>
        <button class="edit-strand-btn">TVL</button>
        <div class="admin-edit-container-table">
          <table class="admin-edit-table">
            <tr class="admin-edit-tr">
              <th class="admin-edit-th">Day</th>
              <th class="admin-edit-th">Time</th>
              <th class="admin-edit-th">Subject</th>
              <th class="admin-edit-th">Room</th>
              <th class="admin-edit-th">Code</th>
              <th class="admin-edit-th">Subject Name</th>
              <th class="admin-edit-th">Remarks</th>
            </tr>
            <tr class="admin-edit-tr">
              <td class="admin-edit-td"></td>
              <td class="admin-edit-td"></td>
              <td class="admin-edit-td"></td>
              <td class="admin-edit-td"></td>
              <td class="admin-edit-td"></td>
              <td class="admin-edit-td"></td>
              <td class="admin-edit-td">Advisory</td>
            </tr>
            <!-- Add more table rows here and remove this comment -->
          </table>
        </div>
      </div>
    </div>

    <script src="/assets/js/script.js"></script>
  </body>
</html>
