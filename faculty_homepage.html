<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Homepage</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="faculty-page-container">
      <div class="faculty-page-box">
        <img src="/assets/images/user.png" alt="Professor Image" />
        <h1>Professor Name</h1>
      </div>

      <a
        href="/faculty_student_list.html"
        target="_blank"
        class="faculty-page-button"
        id="student-list"
      >
        Student List
      </a>
      <a
        href="/faculty_student_grading.html"
        target="_blank"
        class="faculty-page-button"
        id="student-list"
        >Grading</a
      >
      <a
        href="/login_as.html"
        target="_blank"
        class="faculty-page-button"
        id="sign-out"
        >Sign Out</a
      >

      <div class="calendar">
        <div class="header">
          <div class="month">July 2021</div>
          <div class="btns">
            <!-- today -->
            <div class="btn today">
              <i class="fas fa-calendar-day"></i>
            </div>
            <!-- previous month -->
            <div class="btn prev">
              <i class="fas fa-chevron-left"></i>
            </div>
            <!-- next month -->
            <div class="btn next">
              <i class="fas fa-chevron-right"></i>
            </div>
          </div>
        </div>
        <div class="weekdays">
          <div class="day">Sun</div>
          <div class="day">Mon</div>
          <div class="day">Tue</div>
          <div class="day">Wed</div>
          <div class="day">Thu</div>
          <div class="day">Fri</div>
          <div class="day">Sat</div>
        </div>
        <div class="days"></div>
      </div>
    </div>

    <script src="/assets/js/script.js"></script>
  </body>
</html>
