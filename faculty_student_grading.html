<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Student Grading</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css"
    />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head> 
  <body>
    <div class="arrow-back"> 
      <ul>
        <li>
          <a href="/faculty_homepage.html"
            ><span class="material-symbols-outlined"> arrow_back_ios </span></a
          >
        </li>
      </ul>
    </div>
    <div class="faculty-student-grading-container">
      <h1 class="faculty-student-grading-h1" id="student-grading-course">COURSE ID:</h1>
      <h1 class="faculty-student-grading-h1" id="student-gradin-section">SECTION ID:</h1>
      <form class="faculty-student-grading-search-form">
        <div class="faculty-student-grading-search">
          <span class="faculty-student-grading-search-icon material-symbols-outlined">Search</span>
          <input class="faculty-student-grading-search-input" type="search" placeholder="Search" />
        </div>
        <button class="faculty-student-grading-filter-info">
          <span class="material-symbols-outlined" id="student-filter">
            filter_alt
          </span>
        </button>
      </form>
      <div class="faculty-student-grading-container-table">
      <table class="faculty-student-grading-table">
        <tr class="faculty-student-grading-tr">
          <th class="faculty-student-grading-th">STUDENT ID</th>
          <th class="faculty-student-grading-th">FULL NAME</th>
          <th class="faculty-student-grading-th">GRADES</th>
          <th class="faculty-student-grading-th">REMARKS</th>
        </tr>
        <tr class="faculty-student-grading-tr"></tr>
          <td class="faculty-student-grading-td">22-0224</td>
          <td class="faculty-student-grading-td">Señora, Franz Jeremy V.</td>
          <td class="faculty-student-grading-td">97</td>
          <td class="faculty-student-grading-td">PASSED</td>
        </tr>
      </table>
    </div>
    </div>

    <script src="/assets/js/script.js"></script>
  </body>
</html>
